name: mila_vendor
description: "Mila Celebrations - Vendor App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  flutter_svg: ^2.0.17
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.1.6
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.2
  intl: ^0.20.2
  fl_chart: ^0.69.2
  cached_network_image: ^3.4.1
  http: ^1.2.2
  shared_preferences: ^2.3.4
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - fonts/
